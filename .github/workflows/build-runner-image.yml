name: Build Runner Image

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild even if tag already exists'
        required: false
        type: boolean
        default: false

jobs:
  check:
    name: Check upstream compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check runner image compatibility
        run: bash scripts/check-runner-image.sh --verbose

  provision:
    name: Provision exe.dev builder
    needs: check
    runs-on: ubuntu-latest
    outputs:
      vm_name: ${{ steps.setup.outputs.vm_name }}
    steps:
      - uses: actions/checkout@v5

      - uses: ./setup-exe-runner
        id: setup
        with:
          exe-ssh-key: ${{ secrets.EXE_SSH_KEY }}
          github-token: ${{ secrets.GH_RUNNER_TOKEN }}

  build:
    name: Build and push runner image
    needs: provision
    runs-on: [self-hosted, exe]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone exeuntu fork
        uses: actions/checkout@v5
        with:
          repository: metcalfc/exeuntu
          path: exeuntu

      - name: Get latest runner version
        id: runner-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(gh api repos/actions/runner/releases/latest --jq '.tag_name' | sed 's/^v//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Runner version: $VERSION"

      - name: Check if tag already exists
        id: check-tag
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/exeunt-runner:v${{ steps.runner-version.outputs.version }}"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image $IMAGE already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image $IMAGE not found — will build"
          fi

      - name: Set up Docker Buildx
        if: steps.check-tag.outputs.exists == 'false' || inputs.force
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check-tag.outputs.exists == 'false' || inputs.force
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check-tag.outputs.exists == 'false' || inputs.force
        uses: docker/build-push-action@v6
        with:
          context: exeuntu
          push: true
          build-args: |
            RUNNER_VERSION=${{ steps.runner-version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/exeunt-runner:latest
            ghcr.io/${{ github.repository_owner }}/exeunt-runner:v${{ steps.runner-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  teardown:
    name: Teardown exe.dev builder
    runs-on: ubuntu-latest
    needs: [provision, build]
    if: always()
    steps:
      - uses: actions/checkout@v5

      - uses: ./teardown-exe-runner
        with:
          exe-ssh-key: ${{ secrets.EXE_SSH_KEY }}
          vm-name: ${{ needs.provision.outputs.vm_name }}
