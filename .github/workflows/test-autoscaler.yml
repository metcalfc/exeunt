name: Test Autoscaler

on:
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  test:
    name: Run on autoscaler-provisioned runner
    runs-on: [self-hosted, exe]
    steps:
      - name: Join tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: TDJJYqwdU491CNTRL-kipyn1okja11CNTRL
          audience: api.tailscale.com/TDJJYqwdU491CNTRL-kipyn1okja11CNTRL
          tags: tag:exedev

      - name: System info
        run: |
          echo "=== Autoscaler-provisioned runner ==="
          echo "Hostname: $(hostname)"
          echo "OS: $(uname -a)"
          echo "User: $(whoami)"

      - name: Tailscale status
        run: tailscale status

      - name: Toolchain smoke test
        run: |
          echo "=== Mise toolchains ==="
          mise doctor
          go version
          python --version
          ruby --version
          rustc --version
          node --version

      - name: Done
        run: echo "Autoscaler test passed!"
